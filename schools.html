<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select School - FLN Daily Monitoring System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="schools">
    <!-- HEADER -->
    <header>
      <div class="header-container">
        <div class="logo-section">
          <div class="logo">
            <img src="logo.svg" alt="Space ECE India Foundation Logo" />
          </div>
          <div class="header-text">
            <h1>FLN Daily Monitoring System</h1>
            <p>Space ECE India Foundation</p>
          </div>
        </div>
      </div>

      <div class="container">
        <div class="breadcrumb">
          <div class="breadcrumb-item"><a href="cluster.html" style="color: #1E88E5; cursor: pointer;">Cluster</a></div>
          <div class="breadcrumb-separator">></div>
          <div class="breadcrumb-item active">School</div>
          <div class="breadcrumb-separator">></div>
          <div class="breadcrumb-item">Class Progress</div>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
      <div class="page-heading">
        <h2>Schools in Cluster</h2>
        <p>Select a school to record daily FLN monitoring data</p>
      </div>

      <div class="card-grid" id="schoolsList">
        <!-- Schools will be populated by JavaScript -->
      </div>
    </main>

    <!-- FOOTER -->
    <footer>© 2026 Space ECE India Foundation | FLN Monitoring System</footer>

    <script src="script.js"></script>
  </body>
</html>
