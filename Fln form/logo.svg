<!-- Logo SVG for Space ECE India Foundation -->
<!-- This file can be referenced or its content used as data URI -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#FFFFFF"/>
  
  <!-- House outline -->
  <g stroke="#2C3E50" stroke-width="3" fill="none" stroke-linejoin="round">
    <!-- House shape -->
    <polyline points="60,140 100,70 140,140"/>
    <!-- House body -->
    <rect x="60" y="140" width="80" height="50" rx="4"/>
    <!-- Door -->
    <rect x="90" y="160" width="20" height="30" rx="2"/>
  </g>
  
  <!-- Tree (yellow/orange) -->
  <g>
    <!-- Tree trunk -->
    <rect x="50" y="110" width="8" height="30" rx="4" fill="#8B6914"/>
    <!-- Tree foliage -->
    <circle cx="50" cy="95" r="20" fill="#FFA500"/>
    <circle cx="40" cy="105" r="15" fill="#FFB627"/>
    <circle cx="60" cy="105" r="15" fill="#FFB627"/>
  </g>
  
  <!-- Person/Child figure (dark) -->
  <g fill="#1A1A1A">
    <!-- Head -->
    <circle cx="145" cy="95" r="12"/>
    <!-- Body -->
    <rect x="140" y="110" width="10" height="20" rx="5"/>
    <!-- Legs -->
    <rect x="138" y="130" width="4" height="15" rx="2"/>
    <rect x="146" y="130" width="4" height="15" rx="2"/>
  </g>
  
  <!-- Text styling would be added via CSS -->
</svg>
